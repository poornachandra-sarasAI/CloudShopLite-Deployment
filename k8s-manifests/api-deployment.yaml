apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-deployment

spec:
  replicas: 1

  selector:
    matchLabels:
      app: api

  template:
    metadata:
      labels:
        app: api

    spec:
      containers:
        - name: api
          image: 386318839776.dkr.ecr.us-east-1.amazonaws.com/cloudshoplite/api:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 5000
          env:
            - name: REDIS_HOST
              value: redis-service

          resources:
            requests:
              cpu: "100m"      
              memory: "128Mi"
            limits:
              cpu: "500m"      
              memory: "256Mi"
