
apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker-deployment

spec:
  replicas: 1

  selector:
    matchLabels:
      app: worker

  template:
    metadata:
      labels:
        app: worker

    spec:
      containers:
        - name: worker
          image: 386318839776.dkr.ecr.us-east-1.amazonaws.com/cloudshoplite/worker
          imagePullPolicy: Always
          env:
            - name: REDIS_HOST
              value: redis-service
      
          resources:
            requests:
              cpu: "100m"      
              memory: "128Mi"
            limits:
              cpu: "500m"     
              memory: "256Mi"
